name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-14
    timeout-minutes: 30
    permissions:
      contents: write  # required to create releases and upload assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Build, sign, notarize, publish DMG
        # Only set CSC_LINK when the secret is actually present — passing an empty
        # string causes electron-builder to crash trying to load it as a cert file.
        run: |
          if [ -n "$CSC_LINK_RAW" ]; then
            export CSC_LINK="$CSC_LINK_RAW"
            export CSC_KEY_PASSWORD="$CSC_KEY_PASSWORD_RAW"
          fi
          npm run release
        env:
          # Fall back to the auto-provided GITHUB_TOKEN if GH_TOKEN secret is not set
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
          CSC_LINK_RAW: ${{ secrets.MAC_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD_RAW: ${{ secrets.MAC_CERT_P12_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
